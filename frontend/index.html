<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Othello</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="ui-layer">
            <div class="panel">
                <h1>Othello</h1>
                <div class="status-box p1">
                    <h3 id="p1-status">Player 1 (Black)</h3>
                    <p>Discs: <span id="p1-discs">2</span></p>
                    <p style="font-size: 12px; color: #d8dee9">
                        Matches Won: <span id="p1-score">0</span>
                    </p>
                </div>
                <div class="status-box p2">
                    <h3 id="p2-status">Player 2 (White)</h3>
                    <p>Discs: <span id="p2-discs">2</span></p>
                    <p style="font-size: 12px; color: #d8dee9">
                        Matches Won: <span id="p2-score">0</span>
                    </p>
                </div>
                <h2 id="turn-indicator" style="margin-top: 20px">
                    Waiting for agents...
                </h2>
            </div>
        </div>

        <div id="canvas-container">
            <div class="view-panel">
                <canvas id="sim-canvas" width="480" height="480"></canvas>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
